<div class="modal-overlay" *ngIf="isOpen" (click)="onCancel()">
  <div class="modal-container glass-panel animate-scale-in" (click)="$event.stopPropagation()">
    <div class="modal-body">
      <!-- Icon Wrapper (Danger) -->
      <div class="alert-icon-container">
        <div class="alert-icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="alert-svg">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
            <line x1="12" y1="9" x2="12" y2="13"></line>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
          </svg>
        </div>
      </div>

      <!-- Text Content -->
      <div class="alert-content">
        <h3>{{ title }}</h3>
        <p>{{ message }}</p>
      </div>
    </div>

    <!-- Footer Controls -->
    <div class="modal-footer">
      <button class="btn btn-secondary" (click)="onCancel()">Cancel</button>
      <button class="btn btn-danger" (click)="onConfirm()">Delete</button>
    </div>
  </div>
</div>
