<div class="stats-grid">
  <!-- Total Products Card -->
  <div class="stat-card glass-panel theme-indigo">
    <div class="stat-icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="stat-icon">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
        <line x1="12" y1="22.08" x2="12" y2="12"></line>
      </svg>
    </div>
    <div class="stat-content">
      <p class="stat-label">Total Products</p>
      <h3 class="stat-value">{{ totalProducts() }}</h3>
    </div>
  </div>

  <!-- Total Inventory Value Card -->
  <div class="stat-card glass-panel theme-emerald">
    <div class="stat-icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="stat-icon">
        <line x1="12" y1="1" x2="12" y2="23"></line>
        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
      </svg>
    </div>
    <div class="stat-content">
      <p class="stat-label">Inventory Value</p>
      <h3 class="stat-value">{{ totalValue() | currency:'USD':'symbol':'1.2-2' }}</h3>
    </div>
  </div>

  <!-- Low Stock Card -->
  <div class="stat-card glass-panel theme-amber" [class.alert-glow]="lowStockCount() > 0">
    <div class="stat-icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="stat-icon">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
        <line x1="12" y1="9" x2="12" y2="13"></line>
        <line x1="12" y1="17" x2="12.01" y2="17"></line>
      </svg>
    </div>
    <div class="stat-content">
      <p class="stat-label">Low Stock (< 10)</p>
      <h3 class="stat-value">{{ lowStockCount() }}</h3>
    </div>
  </div>

  <!-- Out of Stock Card -->
  <div class="stat-card glass-panel theme-rose" [class.danger-glow]="outOfStockCount() > 0">
    <div class="stat-icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="stat-icon">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="15" y1="9" x2="9" y2="15"></line>
        <line x1="9" y1="9" x2="15" y2="15"></line>
      </svg>
    </div>
    <div class="stat-content">
      <p class="stat-label">Out of Stock</p>
      <h3 class="stat-value">{{ outOfStockCount() }}</h3>
    </div>
  </div>

  <!-- Categories Card -->
  <div class="stat-card glass-panel theme-cyan">
    <div class="stat-icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="stat-icon">
        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
        <polyline points="2 17 12 22 22 17"></polyline>
        <polyline points="2 12 12 17 22 12"></polyline>
      </svg>
    </div>
    <div class="stat-content">
      <p class="stat-label">Categories</p>
      <h3 class="stat-value">{{ categoryCount() }}</h3>
    </div>
  </div>
</div>
